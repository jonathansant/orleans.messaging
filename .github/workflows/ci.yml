name: CI

on:
  push:
    branches:
      - main
      - '[0-9]+.x'
  pull_request:
    branches:
      - main
      - '[0-9]+.x'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore orleans.messaging.slnx

      - name: Build
        run: dotnet build orleans.messaging.slnx --no-restore --configuration Release

      # - name: Test (Memory)
      #   run: >
      #     dotnet test tests/Orleans.Messaging.Tests.Memory/Orleans.Messaging.Tests.Memory.csproj
      #     --no-build
      #     --configuration Release
      #     --logger trx
      #     --results-directory ${{ github.workspace }}/test-results

      - name: Test (Kafka)
        run: >
          dotnet test tests/Orleans.Messaging.Tests.Kafka/Orleans.Messaging.Tests.Kafka.csproj
          --no-build
          --configuration Release
          --logger trx
          --results-directory ${{ github.workspace }}/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/test-results/*.trx
          retention-days: 7
